name: Generative Static Site

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-content:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Generate scheduled content
        run: npm run generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.2' }}
          SITE_URL: ${{ vars.SITE_URL || 'https://web3-domain-institute.edu.pl' }}
      - run: npm run validate
      - run: npm run generate:rss
      - run: npm run generate:sitemaps
      - name: Commit generated content
        run: |
          git config user.name "web3-domain-bot"
          git config user.email "web3-domain-bot@users.noreply.github.com"
          git add src/content public/rss.xml public/sitemap*.xml
          git diff --cached --quiet || git commit -m "chore: scheduled content update"
          git push

  build:
    runs-on: ubuntu-latest
    needs: [update-content]
    if: always() && (github.event_name == 'push' || needs.update-content.result == 'success' || needs.update-content.result == 'skipped')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/configure-pages@v5
      - run: npm ci
      - run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://web3-domain-institute.edu.pl' }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
